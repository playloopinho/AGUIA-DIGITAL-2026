function embaralhar(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function selecionarQuestoes(){
  let disponiveis = banco.filter(q => !memoria.includes(q[0]));

  if(disponiveis.length < TOTAL){
    memoria = [];
    disponiveis = banco;
  }

  const selecionadas = embaralhar([...disponiveis]).slice(0, TOTAL);

  memoria.push(...selecionadas.map(q=>q[0]));
  memoria = memoria.slice(-MEMORIA);
  localStorage.setItem("memoria", JSON.stringify(memoria));

  return selecionadas;
}
