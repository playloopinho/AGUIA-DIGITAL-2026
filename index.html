<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Simulado Oficial - Bases Sociológicas e Filosóficas</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background:#0b1e3d; margin:0; color:white; padding-bottom: 160px; overflow-x: hidden; }
    
    .header-banner { 
        width: 100%; 
        height: 220px; 
        background: #0b1e3d url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Brasão_do_Corpo_de_Fuzileiros_Navais.png') no-repeat center; 
        background-size: contain; 
        margin-bottom: 10px;
    }

    .container { display: flex; flex-direction: column; align-items: center; padding: 5px; }

    .box { 
        background: #132b52; 
        padding: 12px; 
        border-radius: 10px; 
        width: 96%; 
        max-width: 800px; 
        text-align: center; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        border: 1px solid #1c437a; 
    }

    #progress { font-size: 10px; color: #4da6ff; margin-bottom: 5px; font-weight: bold; }
    #question-header { margin: 0; color: #ffcc00; font-size: 13px; text-decoration: underline; font-weight: bold; }
    #question-text { margin: 8px 0; font-size: 12px; line-height: 1.4; text-align: left; white-space: pre-wrap; }

    .option { 
        background: #4da6ff; 
        color: black; 
        padding: 8px; 
        margin: 5px 0; 
        border-radius: 5px; 
        cursor: pointer; 
        font-weight: bold; 
        text-align: left; 
        font-size: 11px; 
        line-height: 1.1;
    }

    .correct { background: green !important; color: white; }
    .wrong { background: red !important; color: white; }

    input { 
        width: 100%; 
        box-sizing: border-box;
        padding: 10px; 
        margin-top: 8px; 
        border-radius: 4px; 
        border: 1px solid #4da6ff; 
        background: #0b1e3d; 
        color: white; 
        font-size: 16px; 
    }

    button { 
        margin-top: 10px; 
        padding: 10px 15px; 
        border: none; 
        border-radius: 4px; 
        background: #ffcc00; 
        color: #0b1e3d; 
        font-weight: bold; 
        font-size: 12px;
        text-transform: uppercase; 
    }

    #feedback-area { background: #071426; padding: 10px; margin-top: 10px; border-left: 4px solid #ffcc00; text-align: left; font-size: 11px; }
    .res-oficial { color: #ffcc00; font-weight: bold; white-space: pre-wrap; display: block; margin-top: 5px; }

    .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #071426; border-top: 2px solid #1c437a; padding: 10px 0; z-index: 100; }
    .nav-title { font-size: 11px; text-align: center; color: #4da6ff; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
    .scroll-wrapper { display: flex; overflow-x: auto; padding: 0 12px; gap: 10px; }
    .nav-item { flex: 0 0 75px; height: 50px; background: #132b52; border: 2.5px solid #4da6ff; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 12px; font-weight: bold; }

    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; background: white; color: #0b1e3d; padding: 15px; border-radius: 10px; z-index: 200; box-shadow: 0 0 25px rgba(0,0,0,0.7); }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 150; }
</style>
</head>
<body>

<div class="header-banner"></div>

<div class="container">
    <div class="box" id="mainBox">
        <div id="progress"></div>
        <h4 id="question-header"></h4>
        <div id="question-text"></div>
        <div id="options"></div>
        <div id="discursive"></div>
        <div id="feedback"></div>
        <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima Questão</button>
    </div>
</div>

<div class="footer-nav">
    <div class="nav-title">Consultar Gabarito (AULA FASE 1 - EXERCÍCIO BASES)</div>
    <div class="scroll-wrapper" id="navBar"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div style="display:flex; justify-content: space-between; border-bottom: 2px solid #0b1e3d; padding-bottom: 6px; margin-bottom: 8px; font-size: 12px; font-weight: bold;">
        <span id="modal-title"></span>
        <span onclick="closeModal()" style="cursor:pointer; font-size: 18px;">&times;</span>
    </div>
    <div id="modal-body" style="font-size: 11px; line-height: 1.3; max-height: 400px; overflow-y: auto;"></div>
</div>

<script>
const questions = [
    {id:"Q-01", q:"1 - Em relação as bases sociológicas, responda: “É aquela em que as pessoas orientam suas ações umas para as outras. O resultado desta orientação de forças agindo no seio de uma coletividade é que vai constituir o material de análise sociológica\". Estamos falando de:", a:["(a) Comportamento.","(b) Situação social.","(c) Filosofia social.","(d) Ética."], correct:1, type:"mc"},
    {id:"Q-02", q:"2 - É o primeiro elemento a unir grupos de indivíduos sob um signo comum; é o elemento catalisador, agente das relações sociais.", a:["(a) Relacionamento cultural.","(b) Competência.","(c) Caráter.","(d) Língua."], correct:3, type:"mc"},
    {id:"Q-03", q:"3 - Abrangem inúmeros aspectos, tais como o vestuário, a alimentação, a música, a religião etc. Tratam, de fato, do estilo de vida de um povo, sua maneira de lidar com a realidade. Eles são relativos ao comportamento em geral. Estamos falando de:", a:["(a) Costumes.","(b) Língua.","(c) Padrão familiar.","(d) Valores."], correct:0, type:"mc"},
    {id:"Q-04", q:"4 - Referem-se a critérios, normas e ideias de uma dada sociedade; Eles têm íntima relação com o processo de formação de atitudes:", a:["(a) Costumes.","(b) Ética.","(c) Cultura pessoal.","(d) Valores."], correct:3, type:"mc"},
    {id:"Q-05", q:"5 - “Dentro de uma determinada cultura, podemos notar grupos de pessoas que desenvolvem comportamentos próprios, não compartilhados por todos os membros desta cultura; é o que se define como”:", a:["(a) Sociedade egoísta.","(b) Contexto social.","(c) Subcultura.","(d) Costume."], correct:2, type:"mc"},
    {id:"Q-06", q:"6 - Diretamente decorrente do conceito de cultura, tal prática consiste em considerar a cultura do próprio grupo como superior às demais; ou seja, é usada como padrão de referência em relação às outras. Estamos falando de:", a:["(a) Etnocentrismo.","(b) Cultura regional.","(c) Valores.","(d) Costumes."], correct:0, type:"mc"},
    {id:"Q-07", q:"7 - São aspectos de um mesmo fenômeno, constantemente vivenciados pelos membros de qualquer grupo social. ______________é um conjunto de privilégios e deveres; _________________ é o comportamento derivado de tal conjunto de privilégios e deveres. Falamos de:", a:["(a) Status - Temperamento.","(b) Papel - Caráter.","(c) Status - Papel.","(d) Papel - Sociedade."], correct:2, type:"mc"},
    {id:"Q-08", q:"8 - “Em relação ao fenômeno, constantemente vivenciados pelos membros de qualquer grupo social: É o comportamento esperado de um indivíduo que detém determinado status”. Estamos falando de:", a:["(a) Temperamento.","(b) Caráter.","(c) Responsabilidade ética.","(d) Papel."], correct:3, type:"mc"},
    {id:"Q-09", q:"9 - Em relação ao “Processo de Interação social”: Quais são os processos de interação de maior incidência nas sociedades e grupos humanos?", a:["(a) Cultura comercial e sociedade.","(b) Cooperação, competição e conflito.","(c) Valores e costumes.","(d) Cultura e subcultura."], correct:1, type:"mc"},
    {id:"Q-10", q:"10 - Em relação ao “Processo de Interação social: Podemos dizer que o _______________é a exacerbação da competição. Uma definição mais específica afirma que tal processo consiste em obter recompensas pela eliminação ou enfraquecimento dos competidores. Falamos de:", a:["(a) Exagero da competição acirrada.","(b) Conflito.","(c) Roubo de posses.","(d) Cuidado individualista."], correct:1, type:"mc"},
    {id:"Q-11", q:"11 - É um ser eminentemente coletivo, uma síntese ou reunião de indivíduos, que possui uma unidade interna, e como tal é percebido por seus membros. Não é um simples aglomerado de pessoas; seus membros estão em permanente interação.", a:["(a) Valores sociais.","(b) Interação social.","(c) Sociedade.","(d) Grupo."], correct:3, type:"mc"},
    {id:"Q-12", q:"12 - Em relação ao “Processo de Interação social”: É definida como a luta pela posse de recompensas cuja oferta é limitada. Tais recompensas incluem dinheiro, poder, status, amor e muitos outros. Estamos falando de:", a:["(a) Cooperação.","(b) Competição.","(c) Conflito.","(d) Conflito exagerado."], correct:1, type:"mc"},
    {id:"Q-13", q:"13 - Complete as lacunas: “A essência da liderança caracteriza-se ainda pela relação da _____________ e da ____________com o processo de influenciação”. A “primeira lacuna” trata fundamentalmente da moral e de sua prática; ao passo que a “segunda lacuna” refere-se ao estudo e à hierarquia desses.", a:["(a) Axiologia e da ética.","(b) Ética e da axiologia.","(c) Sociedade e da filosofia.","(d) Filosofia e da sociedade."], correct:1, type:"mc"},
    {id:"Q-14", q:"14 - A ética não é um valor em si mesma, é, um processo de escolha por meio de valores. Assim, um _____________ é aquele selecionado, dentre tantos outros, a partir de valores culturalmente consagrados. Esses valores se referem às virtudes. Complete a lacuna com a opção correta:", a:["(a) Comportamento ético.","(b) Incentivo material.","(c) Filosofo reconhecido.","(d) Líder delegativo."], correct:0, type:"mc"},
    {id:"Q-15", q:"15 - É a parte da filosofia que se ocupa com a reflexão a respeito dos fundamentos da vida moral. Estamos falando de:", a:["(a) Ética, ou filosofia moral.","(b) Filosofia de Freud.","(c) Axiologia.","(d) Etnocentrismo."], correct:0, type:"mc"},
    {id:"Q-16", q:"16 - É um conjunto de regras que determinam o comportamento dos indivíduos em uma dada sociedade, ou diretrizes que determinam os limites do comportamento aceitável em uma determinada sociedade, estamos falando de:", a:["(a) Moral.","(b) Axiologia.","(c) Cultura.","(d) Subcultura."], correct:0, type:"mc"},
    {id:"Q-17A", q:"17 - Ramo da filosofia que estuda os valores:", a:["(a) Ética.","(b) Valores da liderança.","(c) Axiologia.","(d) Moral."], correct:2, type:"mc"},
    {id:"Q-17B", q:"17 - Implica em uma opção pelo coletivo em detrimento do individual; mas nada impede o desenvolvimento e o estímulo das habilidades de cada membro em prol de um objetivo comum.", a:["(a) Cooperação.","(b) Competição.","(c) Conflito.","(d) Acomodação."], correct:0, type:"mc"},
    {id:"Q-18", q:"18 - PAPEL é o comportamento esperado que detém certo status e:", a:["(a) É um conjunto de privilégios e deveres.","(b) É o comportamento derivado de tal conjunto de privilégios e deveres.","(c) É a tendência a considerar a cultura do grupo superior as demais.","(d) Fortalecimento da autoestima do grupo, sua lealdade interna."], correct:1, type:"mc"},
    {id:"Q-19", q:"19 - Tudo que é aprendido e partilhado pelos membros de determinada sociedade é chamado de:", a:["(a) Raça.","(b) Cultura.","(c) Subcultura.","(d) Crença."], correct:1, type:"mc"},
    {id:"Q-20", q:"20 - “Consiste na hierarquização dos valores. Tanto aqueles estabelecidos pela sociedade à qual pertencemos, quanto aqueles (que em geral coincidem com os primeiros) que nos são transmitidos pela educação familiar e são por nós escalonados, isto é, a eles são atribuídas prioridades”. É a característica fundamental da:", a:["(a) Cultura social.","(b) Axiologia.","(c) Subcultura.","(d) Moral e ética."], correct:1, type:"mc"},
    {id:"Q-21", q:"21 - A filosofia não tem compromisso com fins imediatos ou interesseiros de qualquer ordem; seu objetivo único é o conhecimento e a pesquisa da verdade em si mesma. Várias situações que exigem uma tomada de posição. São questões abrangidas pela filosofia:", a:["(a) Conhecimento e linguagem.","(b) O homem em seus múltiplos aspectos.","(c) Questões pedagógicas e culturais.","(d) Todas as respostas acimas estão corretas."], correct:3, type:"mc"}
];

let shuffled=[]; let current=0;

function createNavBar() {
    const navBar = document.getElementById("navBar"); navBar.innerHTML = "";
    questions.forEach((q, idx) => {
        let div = document.createElement("div"); div.className = "nav-item";
        div.innerText = q.id; div.onclick = () => openModal(idx);
        navBar.appendChild(div);
    });
}

function openModal(idx) {
    const q = questions[idx];
    document.getElementById("modal-title").innerText = "GABARITO " + q.id;
    let resp = q.type === "mc" ? q.a[q.correct] : q.answer;
    document.getElementById("modal-body").innerHTML = `<strong>${q.q.replace(/\n/g, '<br>')}</strong><br><br><span class="res-oficial">${resp.replace(/\n/g, '<br>')}</span>`;
    document.getElementById("modal").style.display = "block"; document.getElementById("overlay").style.display = "block";
}

function closeModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

function start(){
    shuffled=[...questions].sort(() => Math.random() - 0.5);
    createNavBar();
    show();
}

function show(){
    document.getElementById("nextBtn").style.display="none"; document.getElementById("feedback").innerHTML="";
    let q=shuffled[current];
    document.getElementById("question-header").innerText = "QUESTÃO " + q.id;
    document.getElementById("question-text").innerHTML = q.q.replace(/\n/g, '<br>');
    document.getElementById("progress").innerText = "SIMULADO: " + (current+1) + " / " + shuffled.length;
    document.getElementById("options").innerHTML=""; document.getElementById("discursive").innerHTML="";

    if(q.type==="mc"){
        q.a.forEach(opt => {
            let d = document.createElement("div"); d.className="option"; d.innerText=opt;
            d.onclick=() => {
                document.querySelectorAll(".option").forEach(o=>o.onclick=null);
                if(opt === q.a[q.correct]) d.classList.add("correct");
                else { d.classList.add("wrong"); document.querySelectorAll(".option").forEach(o=>{if(o.innerText===q.a[q.correct])o.classList.add("correct")}); }
                document.getElementById("nextBtn").style.display="inline-block";
            };
            document.getElementById("options").appendChild(d);
        });
    } else {
        let inp = document.createElement("input"); inp.placeholder="Escreva sua resposta...";
        let b = document.createElement("button"); b.innerText="Ver Gabarito";
        b.onclick=() => {
            document.getElementById("feedback").innerHTML = `<div id="feedback-area"><strong>GABARITO:</strong> <span class="res-oficial">${q.answer.replace(/\n/g, '<br>')}</span></div>`;
            document.getElementById("nextBtn").style.display="inline-block";
        };
        document.getElementById("discursive").appendChild(inp); document.getElementById("discursive").appendChild(b);
    }
}

function nextQuestion(){ current++; if(current < shuffled.length) show(); else location.reload(); }
start();
</script>
</body>
</html>
