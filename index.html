<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado Oficial - Administração Naval</title>
<style>
    /* FUNDO AZUL NAVAL ÚNICO */
    body { font-family: 'Segoe UI', sans-serif; background:#0b1e3d; margin:0; color:white; padding-bottom: 100px; overflow-x: hidden; }
    
    /* BANNER AJUSTADO PARA MOBILE (MENOR PARA NÃO OCUPAR A TELA TODA) */
    .header-banner {
        width: 100%;
        height: 120px; /* Reduzido de 180px */
        background-color: #0b1e3d;
        background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Brasão_do_Corpo_de_Fuzileiros_Navais.png'); 
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin-bottom: 5px;
        padding: 10px 0;
    }

    .container { display:flex; justify-content:center; padding: 5px; }
    
    /* CAIXA DE CONTEÚDO OTIMIZADA */
    .box { background:#132b52; padding:15px; border-radius:12px; width:95%; max-width:800px; text-align:center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 1px solid #1c437a; }
    
    .option { background:#4da6ff; color:black; padding:10px; margin:8px 0; border-radius:8px; cursor:pointer; font-weight:bold; text-align: left; font-size: 14px; }
    .correct { background:green !important; color:white; }
    .wrong { background:red !important; color:white; }
    
    input { width:90%; padding:10px; margin-top:10px; border-radius: 5px; border: 2px solid #4da6ff; background: #0b1e3d; color: white; }
    
    button { margin-top:10px; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; background: #ffcc00; color: #0b1e3d; font-weight: bold; text-transform: uppercase; }

    #feedback-area { background: #071426; padding: 12px; margin-top: 10px; border-left: 5px solid #ffcc00; text-align: left; font-size: 13px; }
    .res-oficial { color: #ffcc00; font-weight: bold; }

    /* BARRA DE CONSULTA */
    .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #071426; border-top: 1px solid #1c437a; padding: 8px 0; z-index: 100; }
    .nav-title { font-size: 10px; text-align: center; color: #4da6ff; margin-bottom: 5px; font-weight: bold; }
    .scroll-wrapper { display: flex; overflow-x: auto; padding: 0 10px; gap: 5px; }
    .nav-item { flex: 0 0 35px; height: 35px; background: #132b52; border: 1px solid #4da6ff; border-radius: 4px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 12px; }

    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; color: black; padding: 15px; border-radius: 10px; z-index: 200; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
</style>
</head>
<body>

<div class="header-banner"></div>

<div class="container">

        <div id="progress" style="font-size: 11px; color: #4da6ff; margin-bottom: 5px;"></div>
        <h4 id="question" style="margin: 5px 0; font-size: 16px;"></h4>
        <div id="options"></div>
        <div id="discursive"></div>
        <div id="feedback"></div>
        <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima</button>
    </div>
</div>

<div class="footer-nav">
    <div class="nav-title">CONSULTA RÁPIDA (REF. PDF)</div>
    <div class="scroll-wrapper" id="navBar"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div style="display:flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 5px;">
        <span id="modal-title"></span>
        <span onclick="closeModal()" style="padding:5px; cursor:pointer;">X</span>
    </div>
    <div id="modal-body" style="font-size: 13px; max-height: 250px; overflow-y: auto;"></div>
</div>

<script>

    [span_28](start_span)[span_29](start_span){id:9, q:"09-Estágio realizado pelas Praças após cursos, com duração de um ano?", answer:"Estágio de Aplicação[span_28](end_span)[span_29](end_span).", type:"text"},

    [span_32](start_span)[span_33](start_span){id:11, q:"11-Na Sindicância, em quais termos serão ouvidos, respectivamente, o ofendido e as testemunhas?", answer:"Termo de Declarações e Termo de Depoimento[span_32](end_span)[span_33](end_span).", type:"text"},

    [span_36](start_span)[span_37](start_span){id:13, q:"13-Reconhecimento da Pátria à praça falecida no cumprimento do dever?", answer:"Promoção 'post-mortem'[span_36](end_span)[span_37](end_span).", type:"text"},
    [span_38](start_span)[span_39](start_span){id:14, q:"14-Conceitue Contravenção Disciplinar.", answer:"Ação ou omissão contrária às obrigações ou deveres militares que não constitua crime[span_38](end_span)[span_39](end_span).", type:"text"},
    [span_40](start_span)[span_41](start_span){id:15, q:"15-Procedimento para apuração de crimes militares (Art. 9º CPM)?", answer:"Inquérito Policial Militar (IPM)[span_40](end_span)[span_41](end_span).", type:"text"},
    [span_42](start_span)[span_43](start_span){id:16, q:"16-Como os compromissos de tempo de serviço são classificados?", answer:"Inicial; prorrogações; e cursos ou estágios[span_42](end_span)[span_43](end_span).", type:"text"},
    [span_44](start_span)[span_45](start_span){id:17, q:"17-Qual o termo inicial da Sindicância subscrito pelo escrivão?", answer:"Autuação[span_44](end_span)[span_45](end_span).", type:"text"},

    [span_47](start_span)[span_48](start_span){id:19, q:"19-Qual a missão principal no serviço de guarda a presos?", answer:"Mantê-lo sob controle e custódia[span_47](end_span)[span_48](end_span).", type:"text"},
    [span_49](start_span){id:20, q:"20-Órgão que contribui no preparo do Poder Naval em economia e finanças?", answer:"Secretaria-Geral da Marinha (SGM)[span_49](end_span).", type:"text"},
    [span_50](start_span){id:21, q:"21-Termo que registra a anexação de documento que interesse à prova?", answer:"Juntada[span_50](end_span).", type:"text"},

    [span_52](start_span){id:23, q:"23-Proibição da Bandeira Nacional: Usar em mau estado?", answer:"Sim, é proibido usar Bandeira que não esteja em bom estado[span_52](end_span).", type:"text"},
    [span_53](start_span){id:24, q:"24-Proibição da Bandeira Nacional: Usar como revestimento de tribuna?", answer:"Sim, é proibido[span_53](end_span).", type:"text"},
    [span_54](start_span){id:25, q:"25-Proibição da Bandeira Nacional: Abater em continência?", answer:"Sim, é proibido[span_54](end_span).", type:"text"},
    [span_55](start_span)[span_56](start_span){id:26, q:"26-Promoção baseada na precedência hierárquica?", answer:"Promoção por antiguidade[span_55](end_span)[span_56](end_span).", type:"text"},
    [span_57](start_span)[span_58](start_span){id:27, q:"27-Promoção baseada no conjunto de atributos que realçam o valor da praça?", answer:"Promoção por merecimento[span_57](end_span)[span_58](end_span).", type:"text"},
    [span_59](start_span)[span_60](start_span){id:28, q:"28-Promoção após reconhecido o direito à praça preterida?", answer:"Promoção em ressarcimento de preterição[span_59](end_span)[span_60](end_span).", type:"text"},
    [span_61](start_span)[span_62](start_span){id:29, q:"29-Escolta: Quando se deve tocar no preso?", answer:"Legítima defesa, evitar fuga, ferimentos ou dano à propriedade[span_61](end_span)[span_62](end_span).", type:"text"},
    [span_63](start_span){id:30, q:"30-Onde o escrivão ad hoc é designado na falta de militares?", answer:"Qualquer pessoa idônea[span_63](end_span).", type:"text"},

    [span_65](start_span){id:32, q:"32-Atenuante: Tempo de serviço menor de?", answer:"Seis meses[span_65](end_span).", type:"text"},

    [span_77](start_span){id:39, q:"39-O que o SP evita ao observar o preso no tribunal?", answer:"Que ele se fira ou fira outrem[span_77](end_span).", type:"text"},
    [span_78](start_span){id:40, q:"40-Pode colocar emblemas sobre a Bandeira?", answer:"Não, é proibido[span_78](end_span).", type:"text"},
    [span_79](start_span)[span_80](start_span){id:41, q:"41-Dever: Executar tarefas de manutenção?", answer:"Sim, dever específico das Praças[span_79](end_span)[span_80](end_span).", type:"text"},
    [span_81](start_span){id:42, q:"42-Sindicância: O que precede a anexação de papéis?", answer:"Prévio despacho do encarregado[span_81](end_span).", type:"text"},
    [span_82](start_span){id:43, q:"43-Sindicância: Nome da função do escrivão na falta de oficiais/sargentos?", answer:"Escrivão ad hoc[span_82](end_span).", type:"text"}
];

let shuffled=[]; let current=0;

function createNavBar() {
    const navBar = document.getElementById("navBar");
    navBar.innerHTML = "";
    questions.forEach((q, idx) => {
        let div = document.createElement("div");
        div.className = "nav-item";
        div.innerText = q.id;
        div.onclick = () => openModal(idx);
        navBar.appendChild(div);
    });
}

function openModal(idx) {
    const q = questions[idx];
    document.getElementById("modal-title").innerText = "Ref. Gabarito [" + q.id + "]";
    let resp = q.type === "mc" ? q.a[q.correct] : q.answer;
    document.getElementById("modal-body").innerHTML = `<strong>${q.q}</strong><hr><span style="color: #0b1e3d; font-weight:bold; background: #ffcc00; padding: 5px; border-radius:3px;">${resp}</span>`;
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

function start(){
    shuffled=[...questions].sort(() => Math.random() - 0.5);
    createNavBar();
    show();
}

function show(){
    document.getElementById("nextBtn").style.display="none";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("progress").innerText="Q"+(current+1)+"/"+shuffled.length;
    let q=shuffled[current];
    document.getElementById("question").innerText = q.q;
    document.getElementById("options").innerHTML="";
    document.getElementById("discursive").innerHTML="";

    if(q.type==="mc"){
        q.a.forEach(opt => {
            let d = document.createElement("div"); d.className="option"; d.innerText=opt;
            d.onclick=() => {
                if(opt === q.a[q.correct]) d.classList.add("correct");
                else d.classList.add("wrong");
                document.getElementById("nextBtn").style.display="inline-block";
            };
            document.getElementById("options").appendChild(d);
        });
    } else {
        let inp = document.createElement("input"); inp.placeholder="Sua resposta...";
        let b = document.createElement("button"); b.innerText="Ver Gabarito";
        b.onclick=() => {
            document.getElementById("feedback").innerHTML = `<div id="feedback-area"><strong>Gabarito:</strong><br><span class="res-oficial">${q.answer}</span></div>`;
            document.getElementById("nextBtn").style.display="inline-block";
        };
        document.getElementById("discursive").appendChild(inp); document.getElementById("discursive").appendChild(b);
    }
}

function nextQuestion(){ current++; if(current < shuffled.length) show(); else location.reload(); }

start();
</script>
</body>
</html>
