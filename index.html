<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado Oficial - Administração Naval</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background:#0b1e3d; margin:0; color:white; padding-bottom: 120px; }
    
    .header-banner {
        width: 100%;
        height: 180px;
        background-color: #0b1e3d;
        background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Brasão_do_Corpo_de_Fuzileiros_Navais.png'); 
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin-bottom: 10px;
        padding: 20px 0;
    }

    .container { display:flex; justify-content:center; align-items:center; padding: 10px; }
    .box { background:#132b52; padding:25px; border-radius:12px; width:100%; max-width:800px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #1c437a; }
    
    .option { background:#4da6ff; color:black; padding:12px; margin:10px 0; border-radius:8px; cursor:pointer; font-weight:bold; text-align: left; transition: 0.2s; }
    .option:hover { background: #80bfff; }
    .correct { background:green !important; color:white; }
    .wrong { background:red !important; color:white; }
    
    input { width:90%; padding:12px; margin-top:15px; border-radius: 5px; border: 2px solid #4da6ff; background: #0b1e3d; color: white; font-size: 16px; }
    
    button { margin-top:15px; padding:12px 25px; border:none; border-radius:5px; cursor:pointer; background: #ffcc00; color: #0b1e3d; font-weight: bold; text-transform: uppercase; }
    button:hover { background: #e6b800; }

    #feedback-area { background: #071426; padding: 15px; margin-top: 15px; border-left: 5px solid #ffcc00; text-align: left; font-size: 14px; }
    .res-oficial { color: #ffcc00; font-weight: bold; }

    .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #071426; border-top: 1px solid #1c437a; padding: 12px 0; z-index: 100; }
    .nav-title { font-size: 11px; text-align: center; color: #4da6ff; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
    .scroll-wrapper { display: flex; overflow-x: auto; padding: 0 15px; gap: 8px; }
    .nav-item { flex: 0 0 40px; height: 40px; background: #132b52; border: 1px solid #4da6ff; border-radius: 4px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 14px; color: white; }

    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 450px; background: white; color: black; padding: 20px; border-radius: 10px; z-index: 200; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
</style>
</head>
<body>

<div class="header-banner"></div>

<div class="container">
    <div class="box" id="mainBox">
        <div id="progress" style="font-size: 12px; color: #4da6ff; margin-bottom: 10px;"></div>
        <h3 id="question" style="margin-top: 0; min-height: 60px;"></h3>
        <div id="options"></div>
        <div id="discursive"></div>
        <div id="feedback"></div>
        <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima Questão</button>
        <h3 id="result"></h3>
    </div>
</div>

<div class="footer-nav">
    <div class="nav-title">CONSULTA RÁPIDA (NÚMERO DA QUESTÃO NO PDF)</div>
    <div class="scroll-wrapper" id="navBar"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div style="display:flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 10px; padding-bottom: 5px;">
        <span id="modal-title"></span>
        <span style="cursor:pointer" onclick="closeModal()">X</span>
    </div>
    <div id="modal-body" style="font-size: 14px; max-height: 300px; overflow-y: auto;"></div>
</div>

<script>
[span_3](start_span)[span_4](start_span)// Questões extraídas fielmente dos PDFs ADM NAVAL e Questionário[span_3](end_span)[span_4](end_span)
const questions = [
    {id:1, q:"São deveres específicos de todas as Praças da Marinha, EXCETO?", a:["Cumprir as instruções que tiverem para o serviço.","Executar tarefas de manutenção/operação dos equipamentos e conservação de OM.","Tomar parte nas mostras, fainas e exercícios.","Desempenhar tarefas determinadas no porto ou viagem.","Participar dos exercícios de cultura física e desportos."], correct:1, type:"mc"},
    {id:2, q:"Qual das alternativas abaixo não é considerada uma Licença?", a:["Licença para acompanhar cônjuge ou companheiro(a) (LAC).","Licença à adotante (LA).","Licença para tratamento de saúde de pessoa da família (LTSPF).","Licença para frequentar curso de formação pessoal (LECEP).","Licença paternidade (LP)."], correct:3, type:"mc"},
    {id:3, q:"Qual é o documento utilizado para registro de dependentes junto à DPMM e ao CPesFN?", answer:"Declaração de Dependente (DD).", type:"text"},
    {id:4, q:"Qual das alternativas abaixo é uma circunstância atenuante da contravenção disciplinar?", a:["Tratamento com rigor não autorizado.","Cometida em risco à segurança da OM.","Legítima defesa.","Força maior comprovada.","Prestação anterior de serviços relevantes já reconhecidos."], correct:4, type:"mc"},
    {id:5, q:"Qual da alternativa abaixo NÃO é um Requisito Básico para a Matrícula em Curso?", a:["Estar apta em inspeção de saúde.","Ter nota de AMS igual ou superior a sete (7,00).","Ter sido selecionada para o curso ou estágio.","Ter sido aprovada no último JAE anual.","Estar definitivamente impedida de acesso, de acordo com o RPPM."], correct:4, type:"mc"},
    {id:6, q:"Qual das Hipóteses não caracteriza como Crime de Deserção?", a:["Ausentar-se da unidade por mais de oito dias.","Deixar de se apresentar dentro do prazo de 8 dias após cumprir pena.","Não se apresentar no lugar designado, findo o prazo de trânsito.","Deixar de se apresentar no prazo de 8 dias após fim de licença/agregação.","Evadir-se de escolta ou prisão, permanecendo ausente por mais de 8 dias."], correct:2, type:"mc"},
    {id:7, q:"Procedimento administrativo sumário com objetivo de mera apuração preliminar?", answer:"Sindicância.", type:"text"},
    {id:8, q:"Qual Órgão é um Órgão de Assistência direta e imediata do Ministério da Defesa?", answer:"Assessoria Especial Militar.", type:"text"},
    {id:9, q:"Estágio realizado pelas Praças após cursos, com duração de um ano?", answer:"Estágio de Aplicação.", type:"text"},
    {id:10, q:"Quem designa o Escrivão na Sindicância, caso não tenha sido feito pela autoridade nomeante?", answer:"Encarregado da Sindicância.", type:"text"},
    {id:11, q:"Na Sindicância, em quais termos serão ouvidos o ofendido e as testemunhas?", answer:"Termo de Declaração (ofendido) e Termo de Depoimento (testemunhas).", type:"text"},
    {id:12, q:"Promoção que resulta de atos incomuns de coragem e audácia?", answer:"Promoção por bravura.", type:"text"},
    {id:13, q:"Promoção que reconhece a praça falecida no cumprimento do dever?", answer:"Promoção 'post-mortem'.", type:"text"},
    {id:14, q:"Conceitue Contravenção Disciplinar.", answer:"Toda ação ou omissão contrária às obrigações ou deveres militares que não constitua crime.", type:"text"},
    {id:15, q:"Procedimento para apuração de crimes militares (Art. 9º CPM)?", answer:"Inquérito Policial Militar (IPM).", type:"text"},
    {id:16, q:"Como os Compromissos de Tempo de Serviço são classificados?", answer:"Compromisso inicial; decorrentes de prorrogações; e de cursos ou estágios.", type:"text"},
    {id:17, q:"Qual o termo inicial da Sindicância subscrito pelo escrivão?", answer:"Autuação.", type:"text"},
    {id:18, q:"Termo que registra anexação de papel que interesse à prova na Sindicância?", answer:"Juntada.", type:"text"},
    {id:19, q:"Data da Parte de Deserção para ausência iniciada em 05/03/24?", answer:"15 de março de 2024.", type:"text"},
    {id:20, q:"Missão principal no serviço de guarda a presos?", answer:"Mantê-lo sob controle e custódia.", type:"text"},
    {id:21, q:"Órgão que contribui no preparo do Poder Naval em economia e finanças?", answer:"Secretaria-Geral da Marinha (SGM).", type:"text"},
    {id:22, q:"Cite os deveres específicos das Praças (Letra A do questionário).", answer:"Cumprir as instruções que tiverem para o serviço, executando-as e fazendo com que sejam bem executadas por seus subordinados.", type:"text"},
    {id:23, q:"Circunstâncias atenuantes (Questionário Q4):", answer:"Bons antecedentes; Idade < 18; Tempo serviço < 6 meses; Serviços relevantes reconhecidos; Rigor não autorizado; Provocação.", type:"text"},
    {id:24, q:"Promoção baseada no conjunto de atributos que distinguem a praça?", answer:"Promoção por merecimento.", type:"text"},
    {id:25, q:"Promoção baseada na precedência hierárquica (graduação)?", answer:"Promoção por antiguidade.", type:"text"},
    {id:26, q:"Promoção feita após reconhecido o direito à praça preterida?", answer:"Promoção em ressarcimento de preterição.", type:"text"},
    {id:27, q:"Escolta: Quando se pode tocar no preso?", answer:"Legítima defesa, evitar fuga, ferimentos em terceiros ou danificar propriedade.", type:"text"},
    {id:28, q:"Onde os integrantes do SP podem cumprir missões de guarda?", answer:"Tribunal, prisões, locais de trabalho, deslocamentos ou instalações militares.", type:"text"},
    {id:29, q:"Proibição da Bandeira Nacional (I):", answer:"Fazer saudação com a Bandeira, salvo retribuição a outro navio/estabelecimento.", type:"text"},
    {id:30, q:"Proibição da Bandeira Nacional (II):", answer:"Usar Bandeira Nacional que não se encontre em bom estado de conservação.", type:"text"},
    {id:31, q:"Proibição da Bandeira Nacional (III):", answer:"Usar como reposteiro, pano de boca, guarnição de mesa ou revestimento de tribuna.", type:"text"},
    {id:32, q:"Proibição da Bandeira Nacional (IV):", answer:"Usar para honras de caráter particular.", type:"text"},
    {id:33, q:"Proibição da Bandeira Nacional (V):", answer:"Colocar indicações ou emblemas sobre a Bandeira Nacional.", type:"text"},
    {id:34, q:"Proibição da Bandeira Nacional (VI):", answer:"Abater a Bandeira Nacional em continência.", type:"text"},
    {id:35, q:"Designação de escrivão por pessoa idônea?", answer:"Escrivão ad hoc.", type:"text"},
    {id:36, q:"Termo onde o sindicado é ouvido?", answer:"Termo de Inquirição.", type:"text"},
    {id:37, q:"Documento de compromisso de sigilo do escrivão?", answer:"Termo de Compromisso.", type:"text"},
    {id:38, q:"Hipótese de deserção (Evasão):", answer:"Evadir-se de escolta ou prisão por mais de 8 dias.", type:"text"},
    {id:39, q:"Hipótese de deserção (Simulação):", answer:"Criar ou simular incapacidade para exclusão do serviço ativo.", type:"text"},
    {id:40, q:"Hipótese de deserção (Especial):", answer:"Deixar de se apresentar no momento da partida do navio/aeronave tripulada.", type:"text"},
    {id:41, q:"Atenuante: Idade menor de?", answer:"18 anos.", type:"text"},
    {id:42, q:"Atenuante: Tempo de serviço militar menor de?", answer:"Seis meses.", type:"text"},
    {id:43, q:"O que consta na Autuação além da Portaria e Termo de Compromisso?", answer:"Anexos.", type:"text"}
];

let shuffled=[]; let current=0; let score=0;

function createNavBar() {
    const navBar = document.getElementById("navBar");
    navBar.innerHTML = "";
    questions.forEach((q, index) => {
        let div = document.createElement("div");
        div.className = "nav-item";
        div.innerText = q.id;
        div.onclick = () => openModal(index);
        navBar.appendChild(div);
    });
}

function openModal(idx) {
    const q = questions[idx];
    document.getElementById("modal-title").innerText = "Gabarito - Questão " + q.id;
    let resp = q.type === "mc" ? q.a[q.correct] : q.answer;
    document.getElementById("modal-body").innerHTML = `<strong>Pergunta:</strong><p>${q.q}</p><hr><strong>Resposta Oficial:</strong><p style="color: #0b1e3d; font-weight:bold; background: #ffcc00; padding: 10px; border-radius:5px;">${resp}</p>`;
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

function start(){
    shuffled=[...questions];
    for(let i=shuffled.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }
    createNavBar();
    show();
}

function show(){
    document.getElementById("nextBtn").style.display="none";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("progress").innerText="Questão "+(current+1)+" de "+shuffled.length;
    let q=shuffled[current];
    document.getElementById("question").innerText = `Questão [${q.id}] - ${q.q}`;
    document.getElementById("options").innerHTML="";
    document.getElementById("discursive").innerHTML="";

    if(q.type==="mc"){
        let opts = [...q.a];
        let corTxt = q.a[q.correct];
        opts.sort(() => Math.random() - 0.5);
        opts.forEach(opt => {
            let d = document.createElement("div"); d.className="option"; d.innerText=opt;
            d.onclick=() => {
                document.querySelectorAll(".option").forEach(o=>o.onclick=null);
                if(opt === corTxt){ d.classList.add("correct"); score++; }
                else { d.classList.add("wrong"); document.querySelectorAll(".option").forEach(o=>{if(o.innerText===corTxt)o.classList.add("correct")}); }
                document.getElementById("nextBtn").style.display="inline-block";
            };
            document.getElementById("options").appendChild(d);
        });
    } else {
        let inp = document.createElement("input"); inp.id="userInp"; inp.placeholder="Sua resposta...";
        let b = document.createElement("button"); b.innerText="Conferir Resposta";
        b.onclick=() => {
            document.getElementById("feedback").innerHTML = `<div id="feedback-area"><strong>Resposta do PDF:</strong><br><span class="res-oficial">${q.answer}</span></div>`;
            document.getElementById("nextBtn").style.display="inline-block";
        };
        document.getElementById("discursive").appendChild(inp); document.getElementById("discursive").appendChild(b);
    }
}

function nextQuestion(){ current++; if(current < shuffled.length) show(); else finish(); }
function finish(){ document.getElementById("mainBox").innerHTML = `<h2>Simulado Concluído!</h2><p>Acertos Objetivos: ${score}</p><button onclick="location.reload()">Reiniciar</button>`; }

start();
</script>
</body>
</html>
