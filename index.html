
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionário Administração Naval</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0b1e3d;
    color:white;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
}
h1{
    text-align:center;
}
.question{
    margin-bottom:25px;
    padding:15px;
    background:#132b52;
    border-radius:8px;
}
button{
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.restart{
    background:#f0ad4e;
}
</style>
</head>

<body>
<div class="container">
<h1>Administração Naval I e II</h1>
<div id="quiz"></div>
<button onclick="checkAnswers()">Finalizar</button>
<button class="restart" onclick="startQuiz()">Reiniciar</button>
<h2 id="result"></h2>
</div>

<script>

const questions = [
{ q:"1) Documento utilizado para registro de dependentes junto à DPMM e CPesFN?",
a:["Declaração de Dependente (DD)","Portaria Administrativa","Ficha Militar","Termo de Registro"], correct:0},
{ q:"2) Órgão de Direção Setorial relacionado à economia e administração naval?",
a:["Secretaria-Geral da Marinha (SGM)","Comando Naval","Diretoria Militar","Conselho Administrativo"], correct:0},
{ q:"3) Documento que registra anexação à Sindicância?",
a:["Juntada","Autuação","IPM","Portaria"], correct:0},
{ q:"4) Termo inicial da Sindicância?",
a:["Autuação","Juntada","Termo de Depoimento","Relatório"], correct:0},
{ q:"5) Promoção baseada no conjunto de qualidades da praça?",
a:["Promoção por merecimento","Promoção automática","Promoção especial","Promoção administrativa"], correct:0},
{ q:"6) Promoção baseada na precedência hierárquica?",
a:["Promoção por antiguidade","Promoção por bravura","Promoção post-mortem","Promoção especial"], correct:0},
{ q:"7) Promoção por ato de coragem e audácia?",
a:["Promoção por bravura","Promoção por antiguidade","Promoção por tempo","Promoção administrativa"], correct:0},
{ q:"8) Promoção após falecimento em serviço?",
a:["Promoção post-mortem","Promoção honorária","Promoção administrativa","Promoção automática"], correct:0},
{ q:"9) Procedimento administrativo sumário para apuração preliminar?",
a:["Sindicância","IPM","Conselho Disciplinar","Auditoria"], correct:0},
{ q:"10) Procedimento para apuração de crimes militares?",
a:["Inquérito Policial Militar (IPM)","Sindicância","Processo Civil","Portaria"], correct:0},
{ q:"11) Estágio de complementação prática após cursos?",
a:["Estágio de Aplicação","Curso Especial","Treinamento Básico","Estágio Inicial"], correct:0},
{ q:"12) Quem designa o escrivão se autoridade não designar?",
a:["Encarregado da Sindicância","Comandante","Juiz Militar","Secretário"], correct:0},
{ q:"13) Termos usados na Sindicância (ofendido, sindicado, testemunhas)?",
a:["Declaração, Inquirição e Depoimento","Relatório, Juntada e Portaria","Auto, Termo e Anexo","Depoimento, Processo e IPM"], correct:0},
{ q:"14) Crime caracterizado por ausência superior a 8 dias?",
a:["Deserção","Indisciplina","Contravenção","Abandono"], correct:0},
{ q:"15) Promoção após reconhecimento de direito não efetivado?",
a:["Ressarcimento de preterição","Promoção especial","Promoção automática","Promoção administrativa"], correct:0},
{ q:"16) Órgão de assistência direta do Ministério da Defesa?",
a:["Assessoria Especial Militar","SGM","DPMM","CPesFN"], correct:0},
{ q:"17) Documento de compromisso legal do escrivão?",
a:["Termo de Compromisso","Portaria","Autuação","Juntada"], correct:0},
{ q:"18) Conceito de Contravenção Disciplinar?",
a:["Ação ou omissão contrária aos deveres militares que não seja crime","Crime militar","Falta leve","Advertência"], correct:0},
{ q:"19) Licença concedida ao militar?",
a:["Licença paternidade","Licença administrativa","Licença comercial","Licença especial civil"], correct:0},
{ q:"20) Principal missão da Guarda a Presos?",
a:["Manter controle e custódia","Aplicar pena","Julgar","Interrogar"], correct:0},
{ q:"21) Onde o Serviço de Polícia pode atuar?",
a:["Guarda de presos e deslocamentos","Somente tribunal","Somente OM","Apenas prisão"], correct:0},
{ q:"22) Compromissos de tempo de serviço são?",
a:["Iniciais, prorrogações e cursos","Apenas iniciais","Apenas cursos","Apenas prorrogações"], correct:0},
{ q:"23) Não se deve usar Bandeira Nacional como?",
a:["Reposteiro ou pano de boca","Símbolo nacional","Honra oficial","Cerimônia pública"], correct:0},
{ q:"24) Circunstância atenuante disciplinar?",
a:["Bons antecedentes militares","Reincidência","Deserção","Crime militar"], correct:0},
{ q:"25) Quando pode tocar no preso?",
a:["Legítima defesa ou evitar fuga","Sempre","Nunca","Apenas por ordem verbal"], correct:0},
{ q:"26) Dever das Praças?",
a:["Cumprir instruções e executar o serviço","Recusar ordens","Evitar exercícios","Dispensar tarefas"], correct:0}
];

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function startQuiz(){
shuffle(questions);
let quiz=document.getElementById("quiz");
quiz.innerHTML="";
questions.forEach((item,index)=>{
let qDiv=document.createElement("div");
qDiv.classList.add("question");
qDiv.innerHTML="<h3>"+item.q+"</h3>";
let answers=[...item.a];
shuffle(answers);
answers.forEach(answer=>{
qDiv.innerHTML+=`
<label>
<input type="radio" name="q${index}" value="${answer}">
${answer}
</label><br>`;
});
quiz.appendChild(qDiv);
});
document.getElementById("result").innerText="";
}

function checkAnswers(){
let score=0;
questions.forEach((item,index)=>{
let selected=document.querySelector(`input[name="q${index}"]:checked`);
if(selected && selected.value===item.a[item.correct]){
score++;
}
});
document.getElementById("result").innerText="Você acertou "+score+" de "+questions.length+" questões.";
}

startQuiz();

</script>
</body>
</html>
