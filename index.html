<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Militar</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  max-width: 600px;
  margin: auto;
}
button {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  background: #2563eb;
  color: white;
}
button:hover { background: #1d4ed8; }
.progress {
  height: 10px;
  background: #334155;
  border-radius: 6px;
  margin: 10px 0;
}
.bar {
  height: 10px;
  background: #22c55e;
  width: 0%;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="card">
<h2>Treino de Conceitos Militares</h2>

<div class="progress"><div id="bar" class="bar"></div></div>

<p id="pergunta"></p>

<div id="opcoes"></div>

<button onclick="novaRodada()">Nova rodada</button>
<button onclick="mostrarStats()">Estatísticas</button>

<p id="info"></p>
</div>

<script>
const categorias = ["VALOR", "PRECEITO", "DEVER", "DIREITO", "PRERROGATIVA"];
const TOTAL = 10;

const banco = [
["Amar a verdade e responsabilidade", "PRECEITO"],
["Respeitar dignidade humana", "PRECEITO"],
["Cumprir leis e regulamentos", "PRECEITO"],
["Ser justo e imparcial", "PRECEITO"],
["Dedicação e fidelidade à Pátria", "DEVER"],
["Disciplina e respeito à hierarquia", "DEVER"],
["Patriotismo", "VALOR"],
["Espírito de corpo", "VALOR"],
["Estabilidade após 10 anos", "DIREITO"],
["Assistência médico-hospitalar", "DIREITO"],
["Uso de uniformes militares", "PRERROGATIVA"],
["Foro especial em crimes militares", "PRERROGATIVA"]
];

let stats = JSON.parse(localStorage.getItem("stats")) || {total:0, acertos:0};
let questoes = [];
let indice = 0;
let pontos = 0;

function embaralhar(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function novaRodada(){
  questoes = embaralhar([...banco]).slice(0, TOTAL);
  indice = 0;
  pontos = 0;
  mostrar();
}

function mostrar(){
  if(indice >= questoes.length){
    alert(`Pontuação: ${pontos} de ${TOTAL}`);
    localStorage.setItem("stats", JSON.stringify(stats));
    return;
  }

  document.getElementById("pergunta").innerText = questoes[indice][0];
  document.getElementById("info").innerText = `Pergunta ${indice+1} de ${TOTAL}`;
  document.getElementById("bar").style.width = (indice/TOTAL*100)+"%";

  const op = document.getElementById("opcoes");
  op.innerHTML = "";

  embaralhar([...categorias]).forEach(cat=>{
    const b = document.createElement("button");
    b.innerText = cat;
    b.onclick = ()=>responder(cat);
    op.appendChild(b);
  });
}

function responder(escolha){
  const correta = questoes[indice][1];
  stats.total++;

  if(escolha === correta){
    pontos++;
    stats.acertos++;
    alert("Correto!");
  } else {
    alert("Errado! Era " + correta);
  }

  indice++;
  mostrar();
}

function mostrarStats(){
  const taxa = stats.total ? (stats.acertos/stats.total*100).toFixed(1) : 0;
  alert(`Respondidas: ${stats.total}\nAcertos: ${stats.acertos}\nTaxa: ${taxa}%`);
}

novaRodada();
</script>

</body>
</html>
