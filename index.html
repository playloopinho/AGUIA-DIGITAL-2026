<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado Oficial - Administração Naval</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background:#0b1e3d; margin:0; color:white; padding-bottom: 110px; }
    
    .header-banner {
        width: 100%;
        height: 110px;
        background-color: #0b1e3d;
        background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Brasão_do_Corpo_de_Fuzileiros_Navais.png'); 
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        margin-bottom: 5px;
        padding: 10px 0;
    }

    .container { display:flex; justify-content:center; padding: 5px; }
    .box { background:#132b52; padding:15px; border-radius:12px; width:95%; max-width:800px; text-align:center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 1px solid #1c437a; }
    
    .option { background:#4da6ff; color:black; padding:10px; margin:8px 0; border-radius:8px; cursor:pointer; font-weight:bold; text-align: left; font-size: 14px; }
    .correct { background:green !important; color:white; }
    .wrong { background:red !important; color:white; }
    
    input { width:90%; padding:10px; margin-top:10px; border-radius: 5px; border: 2px solid #4da6ff; background: #0b1e3d; color: white; }
    button { margin-top:10px; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; background: #ffcc00; color: #0b1e3d; font-weight: bold; text-transform: uppercase; }

    #feedback-area { background: #071426; padding: 12px; margin-top: 10px; border-left: 5px solid #ffcc00; text-align: left; font-size: 13px; }
    .res-oficial { color: #ffcc00; font-weight: bold; }

    .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #071426; border-top: 1px solid #1c437a; padding: 8px 0; z-index: 100; }
    .nav-title { font-size: 10px; text-align: center; color: #4da6ff; margin-bottom: 5px; font-weight: bold; }
    .scroll-wrapper { display: flex; overflow-x: auto; padding: 0 10px; gap: 5px; }
    .nav-item { flex: 0 0 35px; height: 35px; background: #132b52; border: 1px solid #4da6ff; border-radius: 4px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 12px; }

    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; color: black; padding: 15px; border-radius: 10px; z-index: 200; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
</style>
</head>
<body>

<div class="header-banner"></div>

<div class="container">
    <div class="box" id="mainBox">
        <div id="progress" style="font-size: 11px; color: #4da6ff; margin-bottom: 5px;"></div>
        <h4 id="question" style="margin: 5px 0; font-size: 16px;"></h4>
        <div id="options"></div>
        <div id="discursive"></div>
        <div id="feedback"></div>
        <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Próxima Questão</button>
    </div>
</div>

<div class="footer-nav">
    <div class="nav-title">CENTRAL DE CONSULTA (NÚMERO DA QUESTÃO NO PDF)</div>
    <div class="scroll-wrapper" id="navBar"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <div style="display:flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 5px;">
        <span id="modal-title"></span>
        <span onclick="closeModal()" style="padding:5px; cursor:pointer;">X</span>
    </div>
    <div id="modal-body" style="font-size: 13px; max-height: 250px; overflow-y: auto;"></div>
</div>

<script>
// Questões transcritas fielmente conforme os PDFs ADM NAVAL e Questionário
const questions = [
    {id:1, q:"01-São deveres específicos de todas as Praças da Marinha, EXCETO?", a:["Cumprir as instruções que tiverem para o serviço, executando-as e fazendo com que sejam bem executa-das por seus subordinados.","Executar as tarefas necessárias à manutenção e operação dos equipamentos e à conservação de compar-timentos de suas OM.","Tomar parte nas mostras, fainas e exercícios, ocupando para isto o posto que les for designado.","Desempenhar em serviço, no porto ou em viagem, as tarefas que lhes forem determinadas.","Participar dos exercícios de cultura física e desportos."], correct:1, type:"mc"},
    {id:2, q:"02-Qual das alternativas abaixo não é considerada uma Licença?", a:["Licença para acompanhar conjuge ou companheiro(a) (LAC).","Licença à adotante (LA).","Licença para tratamento de saúde de pessoa da família (LTSPE).","Licença para frequentar curso de formação pessoal (LECEP).","Licença paternidade (LP)."], correct:3, type:"mc"},
    {id:3, q:"03-Qual é o documento utilizado para registro de dependentes junto à DPMM e ao CPesFN?", answer:"Declaração de Dependente (DD).", type:"text"},
    {id:4, q:"04-Qual das alternativas abaixo é uma circunstância atenuante da contravenção disciplinar?", a:["Tratamento em serviço ordinário com rigor não autorizado pelos regulamentos militares.","Ter sido cometida estando em risco a segurança da Organização Militar.","legitima defesa, própria ou de outrem.","Força maior ou caso fortuito plenamente comprovado.","Prestação anterior de serviços relevantes não reconhecidos."], correct:0, type:"mc"},
    {id:5, q:"05-Qual da alternativa abaixo não é um Requisito Básico para a Matricula em Curso?", a:["Estar apta em inspeção de saúde.","Ter nota de AMS igual ou superior a sete (7,00).","Ter sido selecionada para o curso ou estágio.","Ter sido aprovada no último JAE anual.","Estar definitivamente impedida de acesso, de acordo com o estabelecido no RPPM."], correct:4, type:"mc"},
    {id:6, q:"06-Qual das Hipóteses não caracteriza como Crime de Deserção?", a:["Ausentar-se da unidade por mais de oito dias.","Tendo cumprido pena, deixar de se apresentar dentro do prazo de oito dias.","Não se apresentar no lugar designado, findo o prazo de trânsito ou férias.","Deixar de se apresentar à autoridade competente dentro do prazo de 8 dias após licença cassada.","Evadir-se do poder de escolta ou de recinto de prisão ou detenção."], correct:2, type:"mc"},
    {id:7, q:"07-Procedimento administrativo sumário com objetivo de mera apuração preliminar?", answer:"Sindicância.", type:"text"},
    {id:8, q:"08-Qual Órgão é um Órgão de Assistência direta e imediata do Ministério da Defesa?", answer:"Assessoria Especial Militar.", type:"text"},
    {id:9, q:"09-Estágio realizado pelas Praças após os cursos, com duração de um ano?", answer:"Estágio de Aplicação.", type:"text"},
    {id:10, q:"10-A quem caberá a designação do Escrivão, caso não tenha sido efetuada pela autoridade nomeante?", answer:"Encarregado da Sindicância.", type:"text"},
    {id:11, q:"11-Na Sindicância, em quais termos serão ouvidos, respectivamente, o ofendido, o sindicado e as testemunhas?", answer:"Termo de Declaração, Termo de Inquirição e Termo de Depoimento.", type:"text"},
    {id:12, q:"12-Promoção que resulta de ato ou atos incomuns, de coragem e audácia?", answer:"Promoção por bravura.", type:"text"},
    {id:13, q:"13-Reconhecimento da Pátria à praça falecida no cumprimento do dever?", answer:"Promoção 'post-mortem'.", type:"text"},
    {id:14, q:"14-Conceitue Contravenção Disciplinar.", answer:"É toda ação ou omissão contrária às obrigações ou aos deveres militares estatuídos nas leis, nos regulamentos, nas normas e nas disposições em vigor que fundamentam a Organização Militar, desde que não incidindo no que é capitulado pelo Código Penal Militar como crime.", type:"text"},
    {id:15, q:"15-Procedimento para apuração de crimes militares (Art. 9º CPM)?", answer:"Inquérito Policial Militar (IPM).", type:"text"},
    {id:16, q:"16-Como os compromissos de tempo de serviço são classificados?", answer:"Compromisso inicial; compromissos decorrentes das prorrogações do tempo de serviço; e compromissos de cursos ou estágios.", type:"text"},
    {id:17, q:"17-Qual o termo inicial da Sindicância subscrito pelo escrivão?", answer:"Autuação.", type:"text"},
    {id:18, q:"18-Qual dia (data) será lavrada a Parte de Deserção para ausência iniciada em 05/03/2024?", answer:"15 de março de 2024.", type:"text"},
    {id:19, q:"19-Qual a missão principal no serviço de guarda a presos?", answer:"Mantê-lo sob controle e custódia, e executar suas missões de acordo com as ordens e regulamentos militares.", type:"text"},
    {id:20, q:"20-Órgão que contribui no preparo do Poder Naval em economia e finanças?", answer:"Secretaria-Geral da Marinha (SGM).", type:"text"},
    {id:21, q:"21-Termo que registra a anexação de documento ou papel que interesse à prova?", answer:"Juntada.", type:"text"},
    {id:22, q:"22-Documento pelo qual o escrivão prestará compromisso legal de sigilo?", answer:"Termo de Compromisso.", type:"text"},
    {id:23, q:"23-Quais as proibições quanto ao uso da bandeira nacional?", answer:"I-Fazer saudação; II-Usar em mau estado; III-Usar como reposteiro, pano de boca ou revestimento; IV-Uso para honras particulares; V-Colocar emblemas sobre ela; VI-Abater em continência.", type:"text"},
    {id:24, q:"24-Onde os integrantes do SP poderão ser designados para cumprir missões?", answer:"Guarda a presos militares no tribunal, instalações da prisão, locais de trabalho, deslocamentos ou instalações militares.", type:"text"},
    {id:25, q:"25-Na Sindicância, como é denominada a função do escrivão na falta de oficiais ou sargentos?", answer:"Escrivão ad hoc.", type:"text"},
    {id:26, q:"26-Promoção baseada na precedência hierárquica?", answer:"Promoção por antiguidade.", type:"text"},
    {id:27, q:"27-Promoção baseada no conjunto de qualidades e atributos que distinguem a praça?", answer:"Promoção por merecimento.", type:"text"},
    {id:28, q:"28-Promoção feita após reconhecido o direito à praça preterida?", answer:"Promoção em ressarcimento de preterição.", type:"text"},
    {id:29, q:"29-Circunstâncias atenuantes da contravenção disciplinar?", answer:"Bons antecedentes; Idade menor de 18; Tempo serviço menor de 6 meses; Serviços relevantes reconhecidos; Rigor não autorizado; Provocação.", type:"text"},
    {id:30, q:"30-Quando se deve tocar no preso durante a escolta?", answer:"Legítima defesa, evitar fuga, ferimentos em terceiros ou danificação de propriedade.", type:"text"}
];

let shuffled=[]; let current=0;

function createNavBar() {
    const navBar = document.getElementById("navBar");
    navBar.innerHTML = "";
    questions.forEach((q, idx) => {
        let div = document.createElement("div");
        div.className = "nav-item";
        div.innerText = q.id;
        div.onclick = () => openModal(idx);
        navBar.appendChild(div);
    });
}

function openModal(idx) {
    const q = questions[idx];
    document.getElementById("modal-title").innerText = "Gabarito Oficial [" + q.id + "]";
    let resp = q.type === "mc" ? q.a[q.correct] : q.answer;
    document.getElementById("modal-body").innerHTML = `<strong>${q.q}</strong><hr><span class="res-oficial">${resp}</span>`;
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
}

function closeModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

function start(){
    shuffled=[...questions].sort(() => Math.random() - 0.5);
    createNavBar();
    show();
}

function show(){
    document.getElementById("nextBtn").style.display="none";
    document.getElementById("feedback").innerHTML="";
    document.getElementById("progress").innerText="Q"+(current+1)+"/"+shuffled.length;
    let q=shuffled[current];
    document.getElementById("question").innerText = q.q;
    document.getElementById("options").innerHTML="";
    document.getElementById("discursive").innerHTML="";

    if(q.type==="mc"){
        q.a.forEach(opt => {
            let d = document.createElement("div"); d.className="option"; d.innerText=opt;
            d.onclick=() => {
                document.querySelectorAll(".option").forEach(o=>o.onclick=null);
                if(opt === q.a[q.correct]) d.classList.add("correct");
                else { d.classList.add("wrong"); document.querySelectorAll(".option").forEach(o=>{if(o.innerText===q.a[q.correct])o.classList.add("correct")}); }
                document.getElementById("nextBtn").style.display="inline-block";
            };
            document.getElementById("options").appendChild(d);
        });
    } else {
        let inp = document.createElement("input"); inp.placeholder="Sua resposta...";
        let b = document.createElement("button"); b.innerText="Conferir no PDF";
        b.onclick=() => {
            document.getElementById("feedback").innerHTML = `<div id="feedback-area"><strong>Resposta Literal do PDF:</strong><br><span class="res-oficial">${q.answer}</span></div>`;
            document.getElementById("nextBtn").style.display="inline-block";
        };
        document.getElementById("discursive").appendChild(inp); document.getElementById("discursive").appendChild(b);
    }
}

function nextQuestion(){ current++; if(current < shuffled.length) show(); else location.reload(); }

start();
</script>
</body>
</html>
